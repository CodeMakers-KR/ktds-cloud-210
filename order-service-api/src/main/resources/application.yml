server:
  port: 0 # server port를 랜덤하게 생성.

spring:
  datasource:
    driver-class-name: oracle.jdbc.driver.OracleDriver
    url: jdbc:oracle:thin:@localhost:1521:XE
    username: SHOP_ORDERS
    password: shopOrders1234
  application:
    name: order-service-api

mybatis:
  config-location: classpath:mybatis/mybatis-config.xml
  mapper-locations: classpath*:com/example/orderservice/**/mapper/*Mapper.xml
  type-aliases-package: com.example.orderservice.vo
    
# eureka server로 eureka client를 연결.
eureka:
  instance:
    # eureka client에 연결할 인스턴스의 아이디를 랜덤하게 생성.
    # 랜덤 port로 동작하더라도 고유한 인스턴스로 인식.
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    # eureka server의 주소를 지정.
    service-url:
      defaultZone: http://localhost:8761/eureka
    # eureka server의 client로 등록.
    register-with-eureka: true
