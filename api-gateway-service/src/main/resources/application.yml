server:
  port: 8000

token:
  secret: very-long-long-user-token-secret-202507101234
  
spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
          - id: order-service-api
            uri: lb://ORDER-SERVICE-API
            predicates:
            - Path=/order-service-api/**
          - id: item-service-api
            uri: lb://ITEM-SERVICE-API
            predicates:
            - Path=/item-service-api/**
          - id: user-service-login
            uri: lb://USER-SERVICE-API
            predicates:
            - Path=/user-service-api/login
            filters:
            - RewritePath=/user-service-api/login, /login
          - id: user-service-api
            uri: lb://USER-SERVICE-API
            predicates:
            - Path=/user-service-api/**
            filters:
            - AuthorizationHeaderFilter
          - id: user-service
            uri: lb://USER-SERVICE
            predicates:
            - Path=/user-service/**
    
    # eureka serverл°Ь eureka clientл•Љ мЧ∞к≤∞.
eureka:
  instance:
    # eureka clientмЧР мЧ∞к≤∞нХ† мЭЄмК§нДімК§мЭШ мХДмЭілФФл•Љ лЮЬлН§нХШк≤М мГЭмД±.
    # лЮЬлН§ portл°Ь лПЩмЮСнХШлНФлЭЉлПД к≥†мЬ†нХЬ мЭЄмК§нДімК§л°Ь мЭЄмЛЭ.
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    # eureka serverмЭШ м£ЉмЖМл•Љ мІАм†Х.
    service-url:
      defaultZone: http://localhost:8761/eureka
    # eureka serverмЭШ clientл°Ь лУ±л°Э.
    register-with-eureka: true

