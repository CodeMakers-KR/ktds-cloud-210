server:
  port: 0 # server portлҘј лһңлҚӨн•ҳкІҢ мғқм„ұ.

spring:
  datasource:
    driver-class-name: oracle.jdbc.driver.OracleDriver
    url: jdbc:oracle:thin:@localhost:1521:XE
    username: SHOP_USERS
    password: shopUsers1234
  application:
    name: user-service-api

# eureka serverлЎң eureka clientлҘј м—°кІ°.
eureka:
  instance:
    # eureka clientм—җ м—°кІ°н•  мқёмҠӨн„ҙмҠӨмқҳ м•„мқҙл””лҘј лһңлҚӨн•ҳкІҢ мғқм„ұ.
    # лһңлҚӨ portлЎң лҸҷмһ‘н•ҳлҚ”лқјлҸ„ кі мң н•ң мқёмҠӨн„ҙмҠӨлЎң мқёмӢқ.
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    # eureka serverмқҳ мЈјмҶҢлҘј м§Җм •.
    service-url:
      defaultZone: http://localhost:8761/eureka
    # eureka serverмқҳ clientлЎң л“ұлЎқ.
    register-with-eureka: true
